<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Markdown Renderer</title>
<meta name="description" content="Fetch and render Markdown files from any GitHub repo with GitHub-native styling.">

<!-- ═══════════════════════════════════════════════════════════
     EMBEDDED STYLESHEET — GitHub Primer Design System Simulation
     ═══════════════════════════════════════════════════════════ -->
<style>
/* ── CSS Custom Properties: Light Theme ────────────────────── */
:root,
[data-theme="light"] {
  --color-canvas-default: #ffffff;
  --color-canvas-subtle: #f6f8fa;
  --color-canvas-inset: #eff2f5;
  --color-fg-default: #1f2328;
  --color-fg-muted: #656d76;
  --color-fg-subtle: #6e7781;
  --color-fg-on-emphasis: #ffffff;
  --color-border-default: #d0d7de;
  --color-border-muted: #d8dee4;
  --color-border-subtle: rgba(27,31,36,0.15);
  --color-accent-fg: #0969da;
  --color-accent-emphasis: #0969da;
  --color-accent-subtle: #ddf4ff;
  --color-danger-fg: #d1242f;
  --color-danger-subtle: #ffebe9;
  --color-success-fg: #1a7f37;
  --color-success-subtle: #dafbe1;
  --color-attention-fg: #9a6700;
  --color-attention-subtle: #fff8c5;
  --color-done-fg: #8250df;
  --color-done-subtle: #fbefff;
  --color-neutral-subtle: rgba(175,184,193,0.2);
  --color-neutral-muted: rgba(175,184,193,0.4);
  --color-header-bg: #f6f8fa;
  --color-sidebar-bg: #ffffff;
  --color-overlay-bg: rgba(27,31,36,0.5);
  --color-btn-bg: #f6f8fa;
  --color-btn-hover-bg: #f3f4f6;
  --color-btn-border: rgba(27,31,36,0.15);
  --color-btn-text: #24292f;
  --color-scrollbar-thumb: #c1c8ce;
  --shadow-sm: 0 1px 0 rgba(27,31,36,0.04);
  --shadow-md: 0 3px 6px rgba(140,149,159,0.15);
  --shadow-lg: 0 8px 24px rgba(140,149,159,0.2);
  --shadow-inset: inset 0 1px 0 rgba(208,215,222,0.2);

  /* Syntax highlighting - Light */
  --hljs-keyword: #cf222e;
  --hljs-string: #0a3069;
  --hljs-comment: #6e7781;
  --hljs-function: #8250df;
  --hljs-number: #0550ae;
  --hljs-type: #953800;
  --hljs-literal: #0550ae;
  --hljs-tag: #116329;
  --hljs-attr: #0550ae;
  --hljs-selector: #6639ba;
  --hljs-property: #953800;
  --hljs-variable: #e16f24;
  --hljs-operator: #cf222e;
  --hljs-built-in: #0550ae;
  --hljs-meta: #6e7781;
  --hljs-deletion-bg: #ffebe9;
  --hljs-addition-bg: #dafbe1;
}

/* ── CSS Custom Properties: Dark Theme ─────────────────────── */
[data-theme="dark"] {
  --color-canvas-default: #0d1117;
  --color-canvas-subtle: #161b22;
  --color-canvas-inset: #010409;
  --color-fg-default: #e6edf3;
  --color-fg-muted: #8d96a0;
  --color-fg-subtle: #8b949e;
  --color-fg-on-emphasis: #ffffff;
  --color-border-default: #30363d;
  --color-border-muted: #21262d;
  --color-border-subtle: rgba(240,246,252,0.1);
  --color-accent-fg: #4493f8;
  --color-accent-emphasis: #1f6feb;
  --color-accent-subtle: #121d2f;
  --color-danger-fg: #f85149;
  --color-danger-subtle: #220e0a;
  --color-success-fg: #3fb950;
  --color-success-subtle: #0a2118;
  --color-attention-fg: #d29922;
  --color-attention-subtle: #272115;
  --color-done-fg: #a371f7;
  --color-done-subtle: #1c0f30;
  --color-neutral-subtle: rgba(110,118,129,0.1);
  --color-neutral-muted: rgba(110,118,129,0.4);
  --color-header-bg: #161b22;
  --color-sidebar-bg: #0d1117;
  --color-overlay-bg: rgba(1,4,9,0.8);
  --color-btn-bg: #21262d;
  --color-btn-hover-bg: #30363d;
  --color-btn-border: rgba(240,246,252,0.1);
  --color-btn-text: #e6edf3;
  --color-scrollbar-thumb: #484f58;
  --shadow-sm: 0 0 transparent;
  --shadow-md: 0 3px 6px #010409;
  --shadow-lg: 0 8px 24px #010409;
  --shadow-inset: 0 0 transparent;

  /* Syntax highlighting - Dark */
  --hljs-keyword: #ff7b72;
  --hljs-string: #a5d6ff;
  --hljs-comment: #8b949e;
  --hljs-function: #d2a8ff;
  --hljs-number: #79c0ff;
  --hljs-type: #ffa657;
  --hljs-literal: #79c0ff;
  --hljs-tag: #7ee787;
  --hljs-attr: #79c0ff;
  --hljs-selector: #d2a8ff;
  --hljs-property: #ffa657;
  --hljs-variable: #ffa657;
  --hljs-operator: #ff7b72;
  --hljs-built-in: #ffa657;
  --hljs-meta: #8b949e;
  --hljs-deletion-bg: #220e0a;
  --hljs-addition-bg: #0a2118;
}

/* ── Reset & Base ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
  color:var(--color-fg-default);
  background:var(--color-canvas-default);
  line-height:1.5;
  overflow:hidden;
  height:100vh;
}
a{color:var(--color-accent-fg);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit}

/* ── Scrollbar Styling ─────────────────────────────────────── */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-scrollbar-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--color-fg-subtle)}

/* ── App Layout ────────────────────────────────────────────── */
.app-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:48px;
  background:var(--color-header-bg);
  border-bottom:1px solid var(--color-border-default);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  box-shadow:var(--shadow-sm);
}
.header-left{display:flex;align-items:center;gap:12px;min-width:0}
.header-left .hamburger{
  display:none;background:none;border:none;color:var(--color-fg-default);padding:4px;
  border-radius:6px;
}
.header-left .hamburger:hover{background:var(--color-neutral-subtle)}
.header-left svg{flex-shrink:0}
.repo-title{
  font-size:14px;font-weight:600;color:var(--color-fg-default);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.repo-title span{color:var(--color-fg-muted);font-weight:400}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:6px;border:1px solid var(--color-btn-border);
  background:var(--color-btn-bg);color:var(--color-btn-text);
  transition:background .15s,border-color .15s;
}
.icon-btn:hover{background:var(--color-btn-hover-bg)}
.icon-btn svg{width:16px;height:16px}
.settings-btn{
  font-size:12px;padding:0 12px;width:auto;gap:4px;
  display:inline-flex;align-items:center;
}

.app-body{
  display:flex;position:fixed;
  top:48px;left:0;right:0;bottom:0;
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar{
  width:280px;min-width:280px;
  background:var(--color-sidebar-bg);
  border-right:1px solid var(--color-border-default);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:margin-left .25s ease,opacity .25s ease;
}
.sidebar.collapsed{margin-left:-280px;opacity:0;pointer-events:none}
.sidebar-header{
  padding:12px 16px;
  border-bottom:1px solid var(--color-border-muted);
}
.search-box{
  width:100%;padding:5px 12px;
  font-size:12px;line-height:20px;
  color:var(--color-fg-default);
  background:var(--color-canvas-default);
  border:1px solid var(--color-border-default);
  border-radius:6px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search-box:focus{
  border-color:var(--color-accent-fg);
  box-shadow:0 0 0 3px rgba(9,105,218,0.3);
}
.sidebar-tree{
  flex:1;overflow-y:auto;padding:8px 0;
}
.tree-item{
  display:flex;align-items:center;gap:6px;
  padding:4px 16px;font-size:13px;
  color:var(--color-fg-default);cursor:pointer;
  border-left:2px solid transparent;
  transition:background .1s,border-color .1s;
  user-select:none;
}
.tree-item:hover{background:var(--color-neutral-subtle)}
.tree-item.active{
  background:var(--color-accent-subtle);
  border-left-color:var(--color-accent-fg);
  color:var(--color-accent-fg);font-weight:600;
}
.tree-item .icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.tree-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-folder{padding-left:0}
.tree-folder-header{
  display:flex;align-items:center;gap:6px;
  padding:4px 16px;font-size:13px;font-weight:600;
  color:var(--color-fg-muted);cursor:pointer;
  user-select:none;
}
.tree-folder-header:hover{background:var(--color-neutral-subtle)}
.tree-folder-header .caret{
  width:16px;height:16px;transition:transform .15s;flex-shrink:0;
}
.tree-folder-header.collapsed .caret{transform:rotate(-90deg)}
.tree-folder-children{padding-left:12px}
.tree-folder-children.hidden{display:none}
.sidebar-footer{
  padding:8px 16px;border-top:1px solid var(--color-border-muted);
  font-size:11px;color:var(--color-fg-subtle);
}

/* ── Main Content ──────────────────────────────────────────── */
.main-content{
  flex:1;overflow-y:auto;overflow-x:hidden;
  background:var(--color-canvas-default);
}
.content-header{
  position:sticky;top:0;z-index:10;
  padding:10px 24px;
  background:var(--color-canvas-default);
  border-bottom:1px solid var(--color-border-muted);
  font-size:13px;
}
.breadcrumb{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb span{color:var(--color-fg-muted)}
.breadcrumb .crumb{color:var(--color-accent-fg);cursor:pointer}
.breadcrumb .crumb:hover{text-decoration:underline}
.breadcrumb .current{color:var(--color-fg-default);font-weight:600}
.content-body{
  max-width:1012px;margin:0 auto;
  padding:32px 32px 64px;
}

/* ── Loading & Error States ────────────────────────────────── */
.state-container{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:16px;color:var(--color-fg-muted);
}
.spinner{
  width:32px;height:32px;
  border:3px solid var(--color-border-muted);
  border-top-color:var(--color-accent-fg);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{
  padding:16px 20px;border-radius:6px;
  background:var(--color-danger-subtle);
  border:1px solid var(--color-danger-fg);
  color:var(--color-danger-fg);
  font-size:14px;max-width:500px;text-align:center;
}

/* ── Config Modal ──────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:var(--color-overlay-bg);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-overlay.visible{opacity:1;pointer-events:auto}
.modal{
  background:var(--color-canvas-default);
  border:1px solid var(--color-border-default);
  border-radius:12px;
  box-shadow:var(--shadow-lg);
  width:90%;max-width:440px;
  padding:24px;
  transform:translateY(10px);
  transition:transform .2s;
}
.modal-overlay.visible .modal{transform:translateY(0)}
.modal h2{font-size:20px;margin-bottom:4px}
.modal p{font-size:13px;color:var(--color-fg-muted);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--color-fg-default)}
.form-group input{
  width:100%;padding:5px 12px;font-size:14px;
  color:var(--color-fg-default);background:var(--color-canvas-default);
  border:1px solid var(--color-border-default);border-radius:6px;
  outline:none;
}
.form-group input:focus{
  border-color:var(--color-accent-fg);
  box-shadow:0 0 0 3px rgba(9,105,218,0.3);
}
.form-group small{font-size:11px;color:var(--color-fg-subtle);margin-top:2px;display:block}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn{
  padding:5px 16px;font-size:14px;font-weight:500;
  border-radius:6px;border:1px solid var(--color-btn-border);
  background:var(--color-btn-bg);color:var(--color-btn-text);
  transition:background .15s;
}
.btn:hover{background:var(--color-btn-hover-bg)}
.btn-primary{
  background:var(--color-accent-emphasis);
  color:var(--color-fg-on-emphasis);
  border-color:transparent;
}
.btn-primary:hover{opacity:.9;background:var(--color-accent-emphasis)}

/* ──────────────────────────────────────────────────────────────
   GITHUB MARKDOWN BODY — Primer Typography & Component Styles
   ────────────────────────────────────────────────────────────── */
.markdown-body{
  font-size:16px;line-height:1.5;word-wrap:break-word;
  color:var(--color-fg-default);
}

/* Headings */
.markdown-body h1,.markdown-body h2,.markdown-body h3,
.markdown-body h4,.markdown-body h5,.markdown-body h6{
  margin-top:24px;margin-bottom:16px;font-weight:600;line-height:1.25;
  position:relative;
}
.markdown-body h1{font-size:2em;padding-bottom:.3em;border-bottom:1px solid var(--color-border-muted)}
.markdown-body h2{font-size:1.5em;padding-bottom:.3em;border-bottom:1px solid var(--color-border-muted)}
.markdown-body h3{font-size:1.25em}
.markdown-body h4{font-size:1em}
.markdown-body h5{font-size:.875em}
.markdown-body h6{font-size:.85em;color:var(--color-fg-muted)}
.markdown-body h1:first-child,.markdown-body h2:first-child,.markdown-body h3:first-child{margin-top:0}

/* Heading anchors */
.markdown-body .heading-anchor{
  float:left;padding-right:4px;margin-left:-20px;line-height:1.25;
  color:var(--color-fg-default);visibility:hidden;
  text-decoration:none !important;
}
.markdown-body h1:hover .heading-anchor,
.markdown-body h2:hover .heading-anchor,
.markdown-body h3:hover .heading-anchor,
.markdown-body h4:hover .heading-anchor,
.markdown-body h5:hover .heading-anchor,
.markdown-body h6:hover .heading-anchor{visibility:visible}
.markdown-body .heading-anchor svg{vertical-align:middle;fill:currentColor}

/* Paragraphs & Inline */
.markdown-body p{margin-top:0;margin-bottom:16px}
.markdown-body strong{font-weight:600}
.markdown-body em{font-style:italic}
.markdown-body del{text-decoration:line-through;color:var(--color-fg-muted)}
.markdown-body sup,.markdown-body sub{font-size:75%;line-height:0;position:relative;vertical-align:baseline}
.markdown-body sup{top:-0.5em}
.markdown-body sub{bottom:-0.25em}

/* Links */
.markdown-body a{color:var(--color-accent-fg);text-decoration:none}
.markdown-body a:hover{text-decoration:underline}

/* Images */
.markdown-body img{max-width:100%;height:auto;border-radius:6px;display:inline-block}
.markdown-body img[align=right]{padding-left:20px}
.markdown-body img[align=left]{padding-right:20px}

/* Horizontal Rule */
.markdown-body hr{
  height:.25em;padding:0;margin:24px 0;
  background-color:var(--color-border-default);
  border:0;border-radius:2px;
}

/* Blockquotes */
.markdown-body blockquote{
  margin:0 0 16px;padding:0 1em;
  color:var(--color-fg-muted);
  border-left:.25em solid var(--color-border-default);
}
.markdown-body blockquote>:first-child{margin-top:0}
.markdown-body blockquote>:last-child{margin-bottom:0}

/* GitHub Alerts */
.markdown-body .markdown-alert{
  padding:8px 16px;margin-bottom:16px;
  border-left:.25em solid;border-radius:0 6px 6px 0;
}
.markdown-body .markdown-alert .alert-title{
  display:flex;align-items:center;gap:8px;
  font-weight:600;margin-bottom:4px;font-size:14px;
}
.markdown-body .markdown-alert .alert-title svg{flex-shrink:0}
.markdown-body .markdown-alert p{margin-bottom:4px}
.markdown-body .markdown-alert p:last-child{margin-bottom:0}
.markdown-body .alert-note{border-color:var(--color-accent-fg);background:var(--color-accent-subtle)}
.markdown-body .alert-note .alert-title{color:var(--color-accent-fg)}
.markdown-body .alert-tip{border-color:var(--color-success-fg);background:var(--color-success-subtle)}
.markdown-body .alert-tip .alert-title{color:var(--color-success-fg)}
.markdown-body .alert-important{border-color:var(--color-done-fg);background:var(--color-done-subtle)}
.markdown-body .alert-important .alert-title{color:var(--color-done-fg)}
.markdown-body .alert-warning{border-color:var(--color-attention-fg);background:var(--color-attention-subtle)}
.markdown-body .alert-warning .alert-title{color:var(--color-attention-fg)}
.markdown-body .alert-caution{border-color:var(--color-danger-fg);background:var(--color-danger-subtle)}
.markdown-body .alert-caution .alert-title{color:var(--color-danger-fg)}

/* Lists */
.markdown-body ul,.markdown-body ol{padding-left:2em;margin-top:0;margin-bottom:16px}
.markdown-body li{margin-top:.25em}
.markdown-body li>p{margin-top:16px}
.markdown-body li+li{margin-top:.25em}
.markdown-body ul ul,.markdown-body ul ol,.markdown-body ol ol,.markdown-body ol ul{margin-top:0;margin-bottom:0}

/* Task Lists */
.markdown-body .task-list-item{list-style:none;position:relative;padding-left:4px}
.markdown-body .task-list-item input[type="checkbox"]{
  margin-right:6px;vertical-align:middle;position:relative;top:-1px;
  accent-color:var(--color-accent-fg);
}

/* Tables */
.markdown-body table{
  border-spacing:0;border-collapse:collapse;
  width:100%;max-width:100%;
  margin-bottom:16px;overflow:auto;display:block;
}
.markdown-body table th,.markdown-body table td{
  padding:6px 13px;
  border:1px solid var(--color-border-default);
}
.markdown-body table th{
  font-weight:600;
  background:var(--color-canvas-subtle);
}
.markdown-body table tr{
  background:var(--color-canvas-default);
  border-top:1px solid var(--color-border-muted);
}
.markdown-body table tr:nth-child(2n){background:var(--color-canvas-subtle)}

/* Inline Code */
.markdown-body code:not(pre code){
  padding:.2em .4em;margin:0;
  font-size:85%;white-space:break-spaces;
  background:var(--color-neutral-subtle);
  border-radius:6px;
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}

/* Code Blocks */
.markdown-body .code-block-wrapper{
  position:relative;margin-bottom:16px;
}
.markdown-body pre{
  padding:16px;overflow:auto;
  font-size:85%;line-height:1.45;
  background:var(--color-canvas-subtle);
  border-radius:6px;
  border:1px solid var(--color-border-muted);
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  word-wrap:normal;
  margin:0;
}
.markdown-body pre code{
  padding:0;margin:0;font-size:100%;
  background:transparent;border:0;
  white-space:pre;word-break:normal;
  display:block;overflow-x:auto;
  color:var(--color-fg-default);
}

/* Copy Button */
.copy-btn{
  position:absolute;top:8px;right:8px;
  padding:4px 8px;font-size:11px;font-weight:500;
  background:var(--color-btn-bg);
  color:var(--color-btn-text);
  border:1px solid var(--color-btn-border);
  border-radius:6px;
  opacity:0;transition:opacity .15s;
  z-index:2;
  font-family:inherit;
}
.code-block-wrapper:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--color-btn-hover-bg)}
.copy-btn.copied{
  background:var(--color-success-subtle);
  color:var(--color-success-fg);
  border-color:var(--color-success-fg);
}

/* KBD */
.markdown-body kbd{
  display:inline-block;padding:3px 5px;
  font-size:11px;line-height:10px;
  color:var(--color-fg-default);
  vertical-align:middle;
  background:var(--color-canvas-subtle);
  border:solid 1px var(--color-border-default);
  border-bottom-color:var(--color-border-muted);
  border-radius:6px;
  box-shadow:inset 0 -1px 0 var(--color-border-muted);
  font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}

/* Details/Summary */
.markdown-body details{margin-bottom:16px}
.markdown-body details summary{cursor:pointer;font-weight:600;list-style-position:outside}
.markdown-body details summary:hover{color:var(--color-accent-fg)}
.markdown-body details[open] summary{margin-bottom:8px}

/* Definition Lists */
.markdown-body dt{font-weight:600;margin-top:16px}
.markdown-body dd{padding:0 16px;margin-bottom:16px}

/* ── Syntax Highlighting (embedded, theme-aware) ───────────── */
.hljs{background:transparent !important;padding:0 !important}
.hljs-keyword,.hljs-selector-tag,.hljs-deletion{color:var(--hljs-keyword)}
.hljs-string,.hljs-doctag,.hljs-regexp{color:var(--hljs-string)}
.hljs-comment,.hljs-quote{color:var(--hljs-comment);font-style:italic}

/* ── Responsive ────────────────────────────────────────────── */
@media(max-width:768px){
  .header-left .hamburger{display:inline-flex}
  .sidebar{
    position:fixed;top:48px;left:0;bottom:0;z-index:50;
    margin-left:0;box-shadow:var(--shadow-lg);
  }
  .sidebar.collapsed{margin-left:-280px;box-shadow:none}
  .content-body{padding:16px}
  .content-header{padding:10px 16px}
}
@media(max-width:480px){
  .content-body{padding:12px}
  .markdown-body{font-size:15px}
  .markdown-body h1{font-size:1.6em}
  .markdown-body h2{font-size:1.3em}
}

/* ── Noscript ──────────────────────────────────────────────── */

  max-width:500px;margin:80px auto;padding:32px;text-align:center;

     MODULE 1 — CONFIGURATION
     ══════════════════════════════════════════════════════════ */
  const Config = {
    apiBase: 'https://api.github.com',
    rawBase: 'https://raw.githubusercontent.com',
    owner: '',
    repo: '',
    branch: '',
    token: '',

    get repoSlug() { return `${this.owner}/${this.repo}`; },
    get repoApiUrl() { return `${this.apiBase}/repos/${this.repoSlug}`; },
    get rawUrlBase() { return `${this.rawBase}/${this.repoSlug}/${this.branch}`; },

    /** Attempt to populate from URL query params, then localStorage, then GitHub Pages URL */
    load() {
      const params = new URLSearchParams(window.location.search);
      const stored = JSON.parse(localStorage.getItem('ghmd_config') || '{}');

      this.owner  = params.get('owner')  || stored.owner  || '';
      this.repo   = params.get('repo')   || stored.repo   || '';
      this.branch = params.get('branch') || stored.branch || '';
      this.token  = stored.token || '';

      // Auto-detect from GitHub Pages hostname: <owner>.github.io/<repo>/
      if (!this.owner || !this.repo) {
        const host = window.location.hostname;
        const path = window.location.pathname.split('/').filter(Boolean);
        if (host.endsWith('.github.io')) {
          this.owner = this.owner || host.replace('.github.io', '');
          this.repo  = this.repo  || (path[0] || '');
        }
      }

      return !!(this.owner && this.repo);
    },

    save() {
      localStorage.setItem('ghmd_config', JSON.stringify({
        owner: this.owner, repo: this.repo,
        branch: this.branch, token: this.token,
      }));
    },

    getHeaders() {
      const h = { Accept: 'application/vnd.github.v3+json' };
      if (this.token) h.Authorization = `Bearer ${this.token}`;
      return h;
    }

  /* ══════════════════════════════════════════════════════════
     MODULE 3 — FETCHER (all network I/O)
     ══════════════════════════════════════════════════════════ */
  const Fetcher = (() => {
    const cache = new Map();

    async function request(url) {
      if (cache.has(url)) return cache.get(url);
      const res = await fetch(url, { headers: Config.getHeaders() });

      if (res.status === 403) {
        const remaining = res.headers.get('X-RateLimit-Remaining');
        if (remaining === '0') {
          const reset = new Date(res.headers.get('X-RateLimit-Reset') * 1000);
          throw new Error(`GitHub API rate limit exceeded. Resets at ${reset.toLocaleTimeString()}. Add an API token in settings.`);
        }
      }
      if (res.status === 404) throw new Error(`Repository "${Config.repoSlug}" not found. Check owner/repo in settings.`);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status} ${res.statusText}`);

      const data = await res.json();
      cache.set(url, data);
      return data;
    }

    return {
      /** GET /repos/{owner}/{repo} — repo metadata */
      async getRepoMeta() {
        return request(Config.repoApiUrl);
      },

      /** GET /repos/{owner}/{repo}/git/trees/{branch}?recursive=1 — full tree */
      async getTree() {
        const url = `${Config.repoApiUrl}/git/trees/${Config.branch}?recursive=1`;
        const data = await request(url);
        if (data.truncated) {
          console.warn('Repository tree was truncated by GitHub API (very large repo).');
        }
        return data.tree || [];
      },

      /** Fetch raw file content from raw.githubusercontent.com */
      async getFileContent(path) {
        const url = `${Config.rawUrlBase}/${path}`;
        if (cache.has(url)) return cache.get(url);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Failed to fetch ${path}: ${res.status}`);
        const text = await res.text();
        cache.set(url, text);
        return text;
      },

      clearCache() { cache.clear(); }
    };
  })();

        breaks: false,
        pedantic: false,
      });

     * Parse raw markdown into an HTML string.
     * Pipeline: emoji replace → marked parse → return HTML
     */
    function parse(markdown, filePath) {
      const withEmoji = EmojiMapper.replace(markdown);
      const html = marked.parse(withEmoji);
      return html;
    }

    return { configureMark, parse };
  })();

    /** Build nested folder/file structure from flat path list */
    function buildTree(mdFiles) {
      const root = { _files: [], _folders: {} };
      mdFiles.forEach(f => {
        const parts = f.path.split('/');
        let node = root;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!node._folders[parts[i]]) node._folders[parts[i]] = { _files: [], _folders: {} };
          node = node._folders[parts[i]];
        }
        node._files.push({ name: parts[parts.length - 1], path: f.path });
      });
      return root;
    }

      // Sort folders first, then files
      const folderNames = Object.keys(node._folders).sort();
      const files = [...node._files].sort((a, b) => a.name.localeCompare(b.name));

      folderNames.forEach(name => {

        folderDiv.className = 'tree-folder';
        folderDiv.style.paddingLeft = (depth * 12) + 'px';

        const header = document.createElement('div');

        childContainer.className = 'tree-folder-children';

        folderDiv.appendChild(header);
        folderDiv.appendChild(childContainer);
        container.appendChild(folderDiv);

        renderTreeNode(node._folders[name], childContainer, depth + 1);
      });

        const item = document.createElement('div');
        item.className = 'tree-item';
        item.style.paddingLeft = (depth * 12 + 16) + 'px';
        item.dataset.path = file.path;
        item.innerHTML = `${icons.file}<span class="name" title="${file.path}">${file.name}</span>`;

        const basePath = filePath.substring(0, filePath.lastIndexOf('/') + 1);

        // 1. Syntax highlighting
        $markdownBody.querySelectorAll('pre code').forEach(block => {
          try { hljs.highlightElement(block); } catch(e) {}

        // 2. Wrap code blocks + inject Copy button
        $markdownBody.querySelectorAll('pre').forEach(pre => {
          if (pre.parentElement.classList.contains('code-block-wrapper')) return;
          const wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = 'Copy';
          btn.setAttribute('aria-label', 'Copy code to clipboard');
          btn.addEventListener('click', () => {
            const code = pre.querySelector('code')?.textContent || pre.textContent;
            navigator.clipboard.writeText(code).then(() => {
              btn.textContent = 'Copied!';
              btn.classList.add('copied');
              setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => {
              // Fallback
              const ta = document.createElement('textarea');
              ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
              document.body.appendChild(ta); ta.select();
              document.execCommand('copy');
              document.body.removeChild(ta);
              btn.textContent = 'Copied!';
              btn.classList.add('copied');
              setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
            });
          });
          wrapper.appendChild(btn);
        });

        // 3. Heading anchor links
        $markdownBody.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(heading => {
          const text = heading.textContent.trim();
          const slug = text.toLowerCase()
            .replace(/<[^>]*>/g, '')
            .replace(/[^\w\s-]/g, '')
            .replace(/\s+/g, '-')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '');
          heading.id = slug;
          const anchor = document.createElement('a');
          anchor.className = 'heading-anchor';
          anchor.href = '#' + slug;
          anchor.setAttribute('aria-label', 'Link to ' + text);
          anchor.innerHTML = icons.anchor;
          anchor.addEventListener('click', e => {
            e.preventDefault();
            heading.scrollIntoView({ behavior: 'smooth' });
            history.replaceState(null, '', window.location.pathname + window.location.search + '#' + slug);
          });
          heading.insertBefore(anchor, heading.firstChild);
        });

        // 4. Resolve relative images
        $markdownBody.querySelectorAll('img').forEach(img => {
          const src = img.getAttribute('src');
          if (src && !src.startsWith('http') && !src.startsWith('data:') && !src.startsWith('//')) {
            const resolved = new URL(src, `${Config.rawUrlBase}/${basePath}`).href;
            img.src = resolved;
          }
        });

        // 5. Intercept relative .md links
        $markdownBody.querySelectorAll('a').forEach(a => {
          const href = a.getAttribute('href');
          if (!href) return;

          // Skip external links & anchors
          if (href.startsWith('http') || href.startsWith('//') || href.startsWith('mailto:')) return;

          // Handle anchor-only links
          if (href.startsWith('#')) {
            a.addEventListener('click', e => {
              e.preventDefault();
              const target = document.getElementById(href.substring(1));
              if (target) target.scrollIntoView({ behavior: 'smooth' });
            });
            return;
          }

          // Handle relative .md links
          if (href.endsWith('.md') || href.includes('.md#')) {
            a.addEventListener('click', e => {
              e.preventDefault();
              const [path, hash] = href.split('#');
              const resolvedPath = resolvePath(basePath, path);
              App.navigateTo(resolvedPath);
              if (hash) {
                setTimeout(() => {
                  const el = document.getElementById(hash);
                  if (el) el.scrollIntoView({ behavior: 'smooth' });
                }, 300);
              }
            });
          }
        });

        // 6. GitHub-style alerts (> [!NOTE], > [!WARNING], etc.)
        $markdownBody.querySelectorAll('blockquote').forEach(bq => {
          const firstP = bq.querySelector('p');
          if (!firstP) return;
          const html = firstP.innerHTML.trim();
          const match = html.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i);
          if (!match) return;

          const type = match[1].toUpperCase();
          const config = alertConfig[type];
          if (!config) return;

          bq.classList.add('markdown-alert', config.css);
          firstP.innerHTML = html.replace(match[0], '');

          const title = document.createElement('div');
          title.className = 'alert-title';
          title.innerHTML = `${config.icon}<span>${type.charAt(0) + type.slice(1).toLowerCase()}</span>`;
          bq.insertBefore(title, bq.firstChild);
        });

        // 7. Task list styling
        $markdownBody.querySelectorAll('li').forEach(li => {
          const cb = li.querySelector('input[type="checkbox"]');
          if (cb) {
            li.classList.add('task-list-item');
            cb.disabled = true;
          }
        });
      }
    };

    /** Resolve relative path against base */
    function resolvePath(base, relative) {
      if (relative.startsWith('/')) return relative.substring(1);
      const baseParts = base.split('/').filter(Boolean);
      const relParts = relative.split('/');
      relParts.forEach(part => {
        if (part === '..') baseParts.pop();
        else if (part !== '.' && part !== '') baseParts.push(part);
      });
      return baseParts.join('/');
    }
  })();


  /* ══════════════════════════════════════════════════════════
     MODULE 6 — THEME MANAGER
     ══════════════════════════════════════════════════════════ */
  const ThemeManager = (() => {
    const STORAGE_KEY = 'ghmd_theme';
    const $html = document.documentElement;
    const $sun  = document.getElementById('themeIconSun');
    const $moon = document.getElementById('themeIconMoon');

    function apply(theme) {
      $html.setAttribute('data-theme', theme);
      $sun.style.display  = theme === 'dark' ? 'block' : 'none';
      $moon.style.display = theme === 'dark' ? 'none'  : 'block';
      localStorage.setItem(STORAGE_KEY, theme);
    }

    return {
      init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        apply(saved || (prefersDark ? 'dark' : 'light'));

        document.getElementById('themeToggle').addEventListener('click', () => {
          const current = $html.getAttribute('data-theme');
          apply(current === 'dark' ? 'light' : 'dark');
        });
      }
    };
  })();


  /* ══════════════════════════════════════════════════════════
     MODULE 7 — APP CONTROLLER (orchestrator)
     ══════════════════════════════════════════════════════════ */
  const App = (() => {
    let mdFiles = [];
    let currentFile = '';

    // DOM refs for modal
    const $modal      = document.getElementById('configModal');
    const $cfgOwner   = document.getElementById('cfgOwner');
    const $cfgRepo    = document.getElementById('cfgRepo');
    const $cfgBranch  = document.getElementById('cfgBranch');
    const $cfgToken   = document.getElementById('cfgToken');
    const $sidebar    = document.getElementById('sidebar');

    function showModal() {
      $cfgOwner.value  = Config.owner;
      $cfgRepo.value   = Config.repo;
      $cfgBranch.value = Config.branch;
      $cfgToken.value  = Config.token;
      $modal.classList.add('visible');
      $cfgOwner.focus();
    }

    function hideModal() {
      $modal.classList.remove('visible');
    }

    async function loadRepo() {
      try {
        Renderer.showLoading('Fetching repository info…');

        // 1. Get repo metadata
        const meta = await Fetcher.getRepoMeta();
        if (!Config.branch) Config.branch = meta.default_branch;
        Config.save();
        Renderer.setRepoInfo(meta);

        // 2. Get full file tree
        Renderer.showLoading('Indexing markdown files…');
        const tree = await Fetcher.getTree();
        mdFiles = tree.filter(item =>
          item.type === 'blob' &&
          item.path.toLowerCase().endsWith('.md')
        );

        // 3. Render sidebar
        Renderer.renderSidebar(mdFiles);

        // 4. Determine initial file
        const hashFile = window.location.hash.substring(1);
        const target = hashFile && mdFiles.find(f => f.path === decodeURIComponent(hashFile));
        const readme = mdFiles.find(f => f.path.toLowerCase() === 'readme.md');
        const initialFile = target?.path || readme?.path || (mdFiles[0]?.path);

        if (initialFile) {
          await navigateTo(initialFile);
        } else {
          Renderer.showError('No Markdown files found in this repository.');
        }

      } catch (err) {
        console.error(err);
        Renderer.showError(err.message);
      }
    }

    async function navigateTo(path) {
      if (!path) return;
      currentFile = path;

      // Update UI state
      Renderer.setActiveFile(path);
      Renderer.renderBreadcrumb(path);
      Renderer.showLoading(`Rendering ${path}…`);

      // Update URL hash
      history.replaceState(null, '', window.location.pathname + window.location.search + '#' + encodeURIComponent(path));

      try {
        const raw = await Fetcher.getFileContent(path);
        const html = Parser.parse(raw, path);
        Renderer.renderContent(html, path);
      } catch (err) {
        console.error(err);
        Renderer.showError(`Failed to load <strong>${path}</strong>: ${err.message}`);
      }

      // Collapse sidebar on mobile
      if (window.innerWidth <= 768) {
        $sidebar.classList.add('collapsed');
      }
    }

    function init() {
      // Initialize theme
      ThemeManager.init();

      // Configure marked
      Parser.configureMark();

      // Settings button
      document.getElementById('settingsBtn').addEventListener('click', showModal);

      // Modal cancel
      document.getElementById('modalCancel').addEventListener('click', hideModal);

      // Modal submit
      document.getElementById('modalSubmit').addEventListener('click', () => {
        Config.owner  = $cfgOwner.value.trim();
        Config.repo   = $cfgRepo.value.trim();
        Config.branch = $cfgBranch.value.trim();
        Config.token  = $cfgToken.value.trim();

        if (!Config.owner || !Config.repo) {
          $cfgOwner.style.borderColor = Config.owner ? '' : 'var(--color-danger-fg)';
          $cfgRepo.style.borderColor  = Config.repo  ? '' : 'var(--color-danger-fg)';
          return;
        }

        Config.save();
        Fetcher.clearCache();
        hideModal();
        loadRepo();
      });

      // Close modal on overlay click
      $modal.addEventListener('click', e => {
        if (e.target === $modal) hideModal();
      });

      // Close modal on Escape
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && $modal.classList.contains('visible')) hideModal();
      });

      // Enter key in modal
      [$cfgOwner, $cfgRepo, $cfgBranch, $cfgToken].forEach(input => {
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('modalSubmit').click();
        });
      });

      // Hamburger menu
      document.getElementById('hamburgerBtn').addEventListener('click', () => {
        $sidebar.classList.toggle('collapsed');
      });

      // Hash change navigation
      window.addEventListener('hashchange', () => {
        const hashFile = decodeURIComponent(window.location.hash.substring(1));
        if (hashFile && hashFile !== currentFile && mdFiles.find(f => f.path === hashFile)) {
          navigateTo(hashFile);
        }
      });

      // Boot
      if (Config.load()) {
        loadRepo();
      } else {
        showModal();
        Renderer.showLoading('Configure a repository to get started.');
      }
    }

    return { init, navigateTo };
  })();


  /* ══════════════════════════════════════════════════════════
     BOOTSTRAP
     ══════════════════════════════════════════════════════════ */
  App.init();

})();
</script>
